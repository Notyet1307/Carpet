# MCR-720 disposable Synapse scaffold.
# Manual-only, no secrets, no default service start.
name: mcr-720-disposable-synapse

services:
  synapse:
    image: ${MCR_SYNAPSE_IMAGE:-matrixdotorg/synapse:latest}
    profiles:
      - manual
    container_name: mcr-720-disposable-synapse
    restart: "no"
    ports:
      - "127.0.0.1:8008:8008"
      - "127.0.0.1:8448:8448"
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./data:/data
      - ./homeserver.example.yaml:/data/homeserver.yaml:ro
    labels:
      com.notyet.mcr.task: "MCR-720"
      com.notyet.mcr.manual-only: "true"
      com.notyet.mcr.disposable: "true"
