worktree_policy:
  required_for:
    - code_change
    - test_change
    - schema_change
    - fixture_change
    - refactor
    - security_fix
  optional_for:
    - docs_only
    - read_only_analysis
  denied:
    - direct_main_checkout_edits
  branch_pattern: "^mcr/[A-Z]+-[0-9]+/[a-z0-9-]+$"
  path_pattern: "^../\\.worktrees/.+/.+$"
  cleanup_policy: keep_until_merged_or_failed_reviewed
